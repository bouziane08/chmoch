version: '3.8'

services:
  # 1. PostgreSQL (قاعدة البيانات الأساسية)
  postgres:
    image: postgres:16-alpine
    container_name: chmoch-postgres
    restart: always
    environment:
      POSTGRES_USER: bouzi
      POSTGRES_PASSWORD: chaima08
      POSTGRES_DB: hamachm
    ports:
      - '5432:5432' # كتابة الرقم مباشرة تضمن فتح المنفذ
    volumes:
      - postgres_data:/var/lib/postgresql/data
  # 2. MongoDB (للـ Auth أو البيانات غير المنظمة)
  mongo:
    image: mongo:latest
    container_name: chmoch-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-mongo_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-chaima08}
      MONGO_INITDB_DATABASE: ${MONGODB_DB:-auth_mongo_dev}
    ports:
      - '${MONGODB_PORT:-27017}:27017'
    volumes:
      - mongo_data:/data/db

  # 3. Redis
  redis:
    image: redis:7-alpine
    container_name: chmoch-redis
    restart: always
    ports:
      - '6379:6379'

  # 4. MinIO
  minio:
    image: minio/minio:latest
    container_name: chmoch-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio123}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '9001:9001' # واجهة التحكم Console
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # 5. Kafka & Zookeeper (للبنية التحتية القائمة على الأحداث)
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: chmoch-kafka
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  postgres_data:
  mongo_data:
  minio_data:
